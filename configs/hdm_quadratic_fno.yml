data:
    modality: "1D"
    dataset: "Sinc" # "Linear" "Quadratic" "Circle" "Sin" "Sinc" "Doppler" "GaussianBumps" "AMSin"
    num_data: 1000
    dimension: 100
    noise_std: 0.0
    grid_type: "random" # "uniform" / "random" 
    num_basis: null # Number of basis functions to use. If null, all are used. 
    hyp_len: 0.20 #"Quadratic","Circle" = 0.80 "Doppler" = 0.03 others = 0.20 
    hyp_gain: 1.0
    num_workers: 4

model:
    model_type: "MHLKNO_LINATTN"  # "FNO" "KNO" "MHLKNO" "MHLKNO_LINATTN"

    # Unified RF 설정
    rf_backend: "hybrid"       # "rff" | "chebyshev" | "hybrid"
    rf_total_basis: 96        # same feature budget as baseline RFF-only 96
    rf_rff_frac: 0.625        # RFF ratio in hybrid (0~1) 0.5=deg8 0.625=deg6 0.75=deg4

    # Kernel hyperparameters
    kernel_type: "gsm"         # "rbf" | "gsm" | "nsgsm"
    kernel_Q: 6
    kernel_hidden: 64
    enable_kernel_time_cond: true
    kernel_time_hidden: 64

    # (MHLKNO series) Spatial-dependent kernel options
    enable_spatial_kernel: false
    spatial_kernel_hidden: 64

    # MHL-KNO Specific Parameters
    num_kernel_heads: 4
    num_kernel_basis: 100
    kernel_rff_type: "rff"       # "rff" | "qmc" | "ghq"
    kernel_bandwidth_init: 1.0

    # Backbone common (includes FNO skeleton)
    n_modes: [100,]
    hidden_channels: 256
    in_channels: 2
    out_channels: 1
    lifting_channels: 256
    projection_channels: 256
    n_layers: 4
    norm: 'group_norm'
    preactivation: True
    skip: 'soft-gating'
    separable: True
    factorization: null
    rank: 1
    joint_factorization: False
    fixed_rank_modes: False
    implementation: 'factorized'

    ckpt_dir: "./exp/logs/quadratic_experiment/ckpt_step_20000.pth"

diffusion:
    beta_schedule: "cosine"
    num_diffusion_timesteps: 1000

training:
    batch_size: 100
    n_epochs: 1500
    ckpt_store: 100
    val_freq: 50
    val_batch_size: 50

sampling:
    batch_size: 100
    clamp_threshold: 1000
    enable_rms_clip: true
    rms_clip_threshold: 1.50

optim:
    lr: 0.00001
    grad_clip: 1.0
    kappa_lr_multiplier: 10.0


